<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>避けゲー</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: sans-serif;
  }
  #game {
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  .player {
    position: absolute;
    width: 20px;
    height: 20px;
    background: cyan;
  }
  .enemy {
    position: absolute;
    width: 15px;
    height: 15px;
    background: red;
    border-radius: 50%;
  }
  #score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
  }
  #gameover {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    display: none;
  }
</style>
</head>
<body>
<div id="game">
  <div id="player" class="player"></div>
  <div id="score">Score: 0</div>
  <div id="gameover">GAME OVER<br>クリックで再開</div>
</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const gameoverText = document.getElementById("gameover");

let playerX = window.innerWidth / 2;
let playerY = window.innerHeight / 2;
let speed = 5;
let enemies = [];
let score = 0;
let isGameOver = false;

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function spawnEnemy() {
  const enemy = document.createElement("div");
  enemy.classList.add("enemy");

  const side = Math.floor(Math.random() * 4);
  let x, y;

  if (side === 0) { x = 0; y = Math.random() * window.innerHeight; }
  if (side === 1) { x = window.innerWidth; y = Math.random() * window.innerHeight; }
  if (side === 2) { x = Math.random() * window.innerWidth; y = 0; }
  if (side === 3) { x = Math.random() * window.innerWidth; y = window.innerHeight; }

  enemy.x = x;
  enemy.y = y;

  const dx = playerX - x;
  const dy = playerY - y;
  const dist = Math.hypot(dx, dy);

  enemy.vx = dx / dist * 2;
  enemy.vy = dy / dist * 2;

  game.appendChild(enemy);
  enemies.push(enemy);
}

function update() {
  if (isGameOver) return;

  // プレイヤー移動
  if (keys["ArrowUp"] || keys["w"]) playerY -= speed;
  if (keys["ArrowDown"] || keys["s"]) playerY += speed;
  if (keys["ArrowLeft"] || keys["a"]) playerX -= speed;
  if (keys["ArrowRight"] || keys["d"]) playerX += speed;

  playerX = Math.max(0, Math.min(window.innerWidth - 20, playerX));
  playerY = Math.max(0, Math.min(window.innerHeight - 20, playerY));

  player.style.left = playerX + "px";
  player.style.top = playerY + "px";

  // 敵更新
  enemies.forEach(enemy => {
    enemy.x += enemy.vx;
    enemy.y += enemy.vy;

    enemy.style.left = enemy.x + "px";
    enemy.style.top = enemy.y + "px";

    // 当たり判定
    const dx = playerX - enemy.x;
    const dy = playerY - enemy.y;
    if (Math.hypot(dx, dy) < 15) {
      gameOver();
    }
  });

  score++;
  scoreText.textContent = "Score: " + score;

  requestAnimationFrame(update);
}

function gameOver() {
  isGameOver = true;
  gameoverText.style.display = "block";
}

function reset() {
  enemies.forEach(e => e.remove());
  enemies = [];
  playerX = window.innerWidth / 2;
  playerY = window.innerHeight / 2;
  score = 0;
  isGameOver = false;
  gameoverText.style.display = "none";
  update();
}

setInterval(() => {
  if (!isGameOver) spawnEnemy();
}, 1000);

game.addEventListener("click", () => {
  if (isGameOver) reset();
});

update();
</script>
</body>
</html>
