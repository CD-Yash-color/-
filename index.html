<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>避けゲー（改良版）</title>
<style>
body { margin:0; overflow:hidden; background:#111; color:white; font-family:sans-serif; }
#game { position:relative; width:100vw; height:100vh; }
.player { position:absolute; width:20px; height:20px; background:cyan; }
.enemy { position:absolute; width:15px; height:15px; background:red; border-radius:50%; }
.boss { position:absolute; width:80px; height:80px; background:purple; border-radius:50%; }
#ui { position:absolute; top:10px; left:10px; }
#gameover { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:32px; display:none; text-align:center; }
</style>
</head>
<body>
<div id="game">
  <div id="player" class="player"></div>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="wave">Wave: 1</div>
    <div id="bossTimer"></div>
  </div>
  <div id="gameover">GAME OVER<br>クリックで再開</div>
</div>

<script>
const player = document.getElementById("player");
const game = document.getElementById("game");
const scoreText = document.getElementById("score");
const waveText = document.getElementById("wave");
const bossTimerText = document.getElementById("bossTimer");
const gameoverText = document.getElementById("gameover");

let playerX = window.innerWidth/2;
let playerY = window.innerHeight/2;
let speed = 4;
let enemies = [];
let boss = null;
let score = 0;
let isGameOver = false;

let wave = 1;
let enemiesToSpawn = 12;
let spawned = 0;

let isBoss = false;
let bossTime = 0;

const keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// 全方向から出現
function spawnEnemy(){
  if(spawned >= enemiesToSpawn) return;

  const enemy = document.createElement("div");
  enemy.classList.add("enemy");

  const side = Math.floor(Math.random()*4);
  let x,y;

  if(side===0){ x=0; y=Math.random()*window.innerHeight; }
  if(side===1){ x=window.innerWidth; y=Math.random()*window.innerHeight; }
  if(side===2){ x=Math.random()*window.innerWidth; y=0; }
  if(side===3){ x=Math.random()*window.innerWidth; y=window.innerHeight; }

  enemy.x=x; enemy.y=y;

  const dx = playerX-x;
  const dy = playerY-y;
  const dist = Math.hypot(dx,dy);

  const speedScale = 2.5 + wave*0.6;
  enemy.vx = dx/dist * speedScale;
  enemy.vy = dy/dist * speedScale;

  game.appendChild(enemy);
  enemies.push(enemy);
  spawned++;
}

function startBoss(){
  isBoss = true;
  bossTime = 10;
  bossTimerText.textContent = "BOSS: 10";

  boss = document.createElement("div");
  boss.classList.add("boss");
  boss.x = window.innerWidth/2 - 40;
  boss.y = window.innerHeight/2 - 40;
  game.appendChild(boss);
}

// 動き続けないと避けれない弾幕
function bossAttack(){
  if(!boss) return;

  const pattern = Math.floor(Date.now()/500) % 3;

  if(pattern === 0){
    // 回転弾
    for(let i=0;i<16;i++){
      const bullet = document.createElement("div");
      bullet.classList.add("enemy");

      const angle = i * (Math.PI*2/16) + Date.now()/300;
      const speed = 3.5 + wave*0.4;

      bullet.x = boss.x+40;
      bullet.y = boss.y+40;
      bullet.vx = Math.cos(angle)*speed;
      bullet.vy = Math.sin(angle)*speed;

      game.appendChild(bullet);
      enemies.push(bullet);
    }
  }

  if(pattern === 1){
    // プレイヤー狙い弾
    for(let i=0;i<8;i++){
      const bullet = document.createElement("div");
      bullet.classList.add("enemy");

      const dx = playerX - (boss.x+40);
      const dy = playerY - (boss.y+40);
      const dist = Math.hypot(dx,dy);

      const speed = 4 + wave*0.5;

      bullet.x = boss.x+40;
      bullet.y = boss.y+40;
      bullet.vx = dx/dist * speed + (Math.random()-0.5);
      bullet.vy = dy/dist * speed + (Math.random()-0.5);

      game.appendChild(bullet);
      enemies.push(bullet);
    }
  }

  if(pattern === 2){
    // 壁弾（詰むやつ）
    for(let i=0;i<10;i++){
      const bullet = document.createElement("div");
      bullet.classList.add("enemy");

      bullet.x = i*(window.innerWidth/10);
      bullet.y = 0;
      bullet.vx = 0;
      bullet.vy = 5 + wave*0.4;

      game.appendChild(bullet);
      enemies.push(bullet);
    }
  }
}

function nextWave(){
  wave++;
  enemiesToSpawn += 6;
  spawned = 0;
  waveText.textContent = "Wave: "+wave;

  if(wave % 5 === 0){ startBoss(); }
}

function update(){
  if(isGameOver) return;

  if(keys["ArrowUp"]||keys["w"]) playerY-=speed;
  if(keys["ArrowDown"]||keys["s"]) playerY+=speed;
  if(keys["ArrowLeft"]||keys["a"]) playerX-=speed;
  if(keys["ArrowRight"]||keys["d"]) playerX+=speed;

  player.style.left=playerX+"px";
  player.style.top=playerY+"px";

  if(isBoss){
    if(Math.random()<0.2) bossAttack();

    bossTime -= 1/60;
    bossTimerText.textContent = "BOSS: "+bossTime.toFixed(1);

    if(bossTime <= 0){
      boss.remove();
      boss = null;
      isBoss = false;
      bossTimerText.textContent = "";
      enemies.forEach(e=>e.remove());
      enemies=[];
      nextWave();
    }
  } else {
    spawnEnemy();

    if(spawned >= enemiesToSpawn && enemies.length===0){ nextWave(); }
  }

  enemies.forEach((enemy,i)=>{
    enemy.x += enemy.vx || 0;
    enemy.y += enemy.vy || 0;

    enemy.style.left=enemy.x+"px";
    enemy.style.top=enemy.y+"px";

    if(Math.hypot(playerX-enemy.x, playerY-enemy.y)<15){ gameOver(); }

    if(enemy.x< -20 || enemy.x>window.innerWidth+20 || enemy.y< -20 || enemy.y>window.innerHeight+20){
      enemy.remove();
      enemies.splice(i,1);
    }
  });

  score++;
  scoreText.textContent="Score: "+score;

  requestAnimationFrame(update);
}

function gameOver(){
  isGameOver=true;
  gameoverText.style.display="block";
}

function reset(){
  enemies.forEach(e=>e.remove());
  enemies=[];
  if(boss) boss.remove();
  boss=null;
  score=0;
  wave=1;
  enemiesToSpawn=12;
  spawned=0;
  isGameOver=false;
  isBoss=false;
  gameoverText.style.display="none";
  waveText.textContent="Wave: 1";
  update();
}

game.addEventListener("click",()=>{ if(isGameOver) reset(); });

update();
</script>
</body>
</html>
